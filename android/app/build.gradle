apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: 'com.google.gms.google-services'

/**
 * React Native configuration
 */
react {
    // Autolinking libraries
    autolinkLibrariesWithApp()
    
    // Enable hermes for better performance
    hermesEnabled = true
    
    // Optional: Set custom root if needed
    // root = file("../../")
    // reactNativeDir = file("../../node_modules/react-native")
}

/**
 * ProGuard settings
 */
def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdkVersion rootProject.ext.compileSdkVersion
    
    namespace "com.lovellapp.lovell"
    
    defaultConfig {
        applicationId "com.lovellapp.lovell"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        
        // Add this for vector icons support
        vectorDrawables.useSupportLibrary = true
        
        // Add this for multi-dex support if needed
        multiDexEnabled true
    }
    
    // Java 17 compatibility
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    // Kotlin compatibility
    kotlinOptions {
        jvmTarget = "17"
    }
    
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }
    
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    
    // Packaging options to handle duplicate native libraries
    packagingOptions {
        pickFirst '**/armeabi-v7a/libc++_shared.so'
        pickFirst '**/arm64-v8a/libc++_shared.so'
        pickFirst '**/x86/libc++_shared.so'
        pickFirst '**/x86_64/libc++_shared.so'
        pickFirst '**/libjsc.so'
        pickFirst '**/libfbjni.so'
        pickFirst '**/libreanimated.so'
        pickFirst '**/libreact_nativemodule_core.so'
        pickFirst '**/libturbomodulejsijni.so'
        pickFirst '**/libhermes.so'
        pickFirst '**/libhermes-executor-debug.so'
        pickFirst '**/libhermes-executor-release.so'
    }
    
    // For React Native 0.73+
    buildFeatures {
        buildConfig true
    }
}

dependencies {
    // React Native core
    implementation("com.facebook.react:react-android")
    
    // Firebase dependencies
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
    implementation 'com.google.firebase:firebase-storage'
    implementation 'com.google.firebase:firebase-messaging'
    
    // Multi-dex support
    implementation 'androidx.multidex:multidex:2.0.1'
    
    // Vector icons support
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    
    // Hermes or JSC
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// Run this task to generate codegen files
task generateCodegenArtifacts(type: Exec) {
    commandLine 'npx', 'react-native', 'codegen'
}

// Add this to ensure codegen runs before build
preBuild.dependsOn generateCodegenArtifacts